spring:
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:mysql://localhost:3306/ai_kb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
          username: ${DB_USERNAME:root}
          password: ${DB_PASSWORD:root}
          driver-class-name: com.mysql.cj.jdbc.Driver
        pgvector:
          url: jdbc:postgresql://localhost:5432/ai_kb_vector
          username: ${PG_USERNAME:postgres}
          password: ${PG_PASSWORD:postgres}
          driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    encoding: UTF-8

  # Spring AI - OpenAI
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-3-small

    # Ollama（本地模型，开发阶段优先使用）
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: qwen2.5:7b
      embedding:
        options:
          model: bge-m3

    # PGVector 向量库
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024    # bge-m3 维度为 1024（生产用 text-embedding-3-small 时改回 1536）
        initialize-schema: true
