spring:
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:mysql://localhost:3306/ai_kb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
          username: ${DB_USERNAME:root}
          password: ${DB_PASSWORD:root}
          driver-class-name: com.mysql.cj.jdbc.Driver
        pgvector:
          url: jdbc:postgresql://localhost:5432/ai_kb_vector
          username: ${PG_USERNAME:postgres}
          password: ${PG_PASSWORD:postgres}
          driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    encoding: UTF-8

  # Spring AI - 通义百炼（OpenAI 兼容协议）
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:sk-3a21afb9b6db485aab1051893fca1979}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3

    # Ollama（备用，可不启动）
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: qwen2.5:7b
      embedding:
        options:
          model: bge-m3

    # PGVector 向量库
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024    # text-embedding-v3 维度 1024
        initialize-schema: true
