spring:
  profiles:
    active: dev

  application:
    name: ai-knowledge-base-backend

  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # Jackson
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: 8080
  servlet:
    context-path: /api

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
  level:
    com.smartdocs.aikb: debug

# 应用自定义配置
app:
  # JWT 配置
  jwt:
    # 生产环境务必通过环境变量覆盖此密钥
    secret: ${JWT_SECRET:change-me-in-production-at-least-32-chars}
    access-token-expire: 900       # 15 分钟（秒）
    refresh-token-expire: 604800   # 7 天（秒）

  # RAG 增强配置
  rag:
    hyde:
      enabled: false    # HyDE 假设答案增强检索（开启后每次多一次 LLM 调用）
    rerank:
      enabled: true     # 关键词混合重排序（无额外模型依赖，建议开启）
    cache:
      enabled: true     # Redis 问答缓存（相同问题+KB 直接返回缓存）
      ttl-minutes: 60   # 缓存有效期（分钟）
  # CORS
  cors:
    # 多个用逗号分隔；前端默认 8000 端口，Vite 默认 5173
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8000,http://localhost:5173}
  # Cookie（生产 HTTPS 环境务必置为 true）
  cookie:
    secure: ${COOKIE_SECURE:false}
  # MinIO 配置
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:ai-kb}
  # 文档上传限制
  upload:
    max-file-size: 52428800   # 50MB（字节）
    local-root: ${UPLOAD_LOCAL_ROOT:./data/uploads}
    allowed-mime-types:
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-powerpoint
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
      - text/plain
      - text/markdown
      - text/html

  # 文档解析与切片
  parse:
    chunk-size: 800           # 字符数
    chunk-overlap: 100        # 相邻块重叠字符
